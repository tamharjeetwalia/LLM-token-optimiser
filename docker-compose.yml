version: '3.8'

services:
  backend:
    build: ./backend
    container_name: token-optimizer-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/src:/app/src
    networks:
      - token-optimizer-network

  frontend:
    build: ./frontend
    container_name: token-optimizer-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:3001
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - token-optimizer-network

networks:
  token-optimizer-network:
    driver: bridge
